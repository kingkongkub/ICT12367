{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 style="color: blueviolet;" class="text-center">ยินดีต้อนรับเข้าสู่ประชากร</h2>

    <table class="table table-hover">
        <thead>
            <tr>
                <th scope="col">รหัสประชากร</th>
                <th scope="col">ชื่อประชากร</th>
                <th scope="col">อายุ</th>
                <th scope="col">วันที่เพิ่มข้อมูล</th>  <!-- Assignment 11 -->
                <th scope="col">แก้ไข</th>
                <th scope="col">ลบ</th>
            </tr>
        </thead>
        <tbody>
            {% for person in all_person %}
            <tr>
                <th scope="row">{{person.id}}</th>
                <td>{{person.name}}</td>
                <td>{{person.age}}</td>
                <td>{{person.created_date|date:"F j, Y"}}</td>  <!-- Assignment 11 -->
                <td><a href="#" class="btn btn-warning">แก้ไข</a></td>
                <td><a href="#" class="btn btn-danger">ลบ</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
