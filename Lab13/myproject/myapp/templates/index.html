<!DOCTYPE html>
<html>
<head>

<title>ICT12367</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.btn-pink{
background-color:#ff4da6;
color:white;
}

.btn-orange{
background-color:#ff8800;
color:white;
}

</style>

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<span class="navbar-brand">ICT12367 SPU</span>

<a href="/form" class="btn btn-primary">
เพิ่มข้อมูล
</a>

</div>
</nav>

<div class="container mt-4">

<h3 class="text-primary mb-3">
ยินดีต้อนรับเข้าสู่ประชากร
</h3>

<!-- ✅ เพิ่มช่องค้นหา -->
<form method="GET" class="mb-3 d-flex">
    <input type="text" name="q" class="form-control me-2" 
           placeholder="ค้นหาชื่อหรือรหัส..." 
           value="{{ query|default:'' }}">

    <button type="submit" class="btn btn-primary">
        🔍 ค้นหา
    </button>

    <a href="/" class="btn btn-secondary ms-2">
        รีเซ็ต
    </a>
</form>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>รหัสประชากร</th>
<th>ชื่อประชากร</th>
<th>อายุ</th>
<th class="text-center">แก้ไข</th>
<th class="text-center">ลบ</th>
</tr>

</thead>

<tbody>

{% for p in persons %}

<tr>

<td>{{ p.id }}</td>
<td>{{ p.name }}</td>
<td>{{ p.age }}</td>

<td class="text-center">

<a href="/edit/{{p.id}}" class="btn btn-pink btn-sm">
Edit
</a>

</td>

<td class="text-center">

<a href="/delete/{{p.id}}" class="btn btn-orange btn-sm">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
